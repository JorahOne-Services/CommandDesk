version: "3.9"

# Production override — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  llama:
    restart: always
    deploy:
      resources:
        limits:
          memory: 7G
          cpus: "6.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  helpdesk-agent:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
      - DEBUG=0
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-agent:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
      - DEBUG=0
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  whatsapp-webhook:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          memory: 500M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chroma:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
    deploy:
      resources:
        limits:
          memory: 300M

  searxng:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  n8n:
    restart: always
    environment:
      - N8N_RUNNERS_ENABLED=true
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 200M

  health-monitor:
    restart: always
    environment:
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 200M

  email-fetcher:
    restart: always
    environment:
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 500M

  tools-ui:
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
